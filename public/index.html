<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>YouTube Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 10px;
}

h1 {
  text-align: center;
  font-size: 22px;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Input + Button */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff0000;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #cc0000;
}

/* Boxen */
.box {
  background: #1e1e1e;
  padding: 12px;
  border-radius: 12px;
  margin-top: 15px;
}

/* Kommentare */
#comments {
  max-height: 300px;
  overflow-y: auto;
}

.comment {
  border-bottom: 1px solid #333;
  padding: 10px 0;
}

.author {
  font-weight: bold;
  color: #ff5555;
  margin-bottom: 4px;
}

/* Transkript */
#transcript {
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 15px;
}

/* Ladezustand */
.loading {
  opacity: 0.6;
  font-style: italic;
}

/* Desktop Anpassung */
@media (min-width: 768px) {
  .input-group {
    flex-direction: row;
  }

  input {
    width: 70%;
  }

  button {
    width: auto;
  }

}

  /* Button Gruppe */
.button-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button-group button {
  width: 100%;
}

/* Optional: Desktop etwas kompakter */
@media (min-width: 768px) {
  .button-group {
    flex-direction: row;
  }

  .button-group button {
    width: auto;
  }
}
</style>
</head>

<body>
  <div class="container">

    <h1>YouTube Kommentare + Transkript</h1>

<div class="input-group">
  <input id="url" placeholder="YouTube Link einfügen">

  <div class="button-group">
    <button onclick="loadData()">Start</button>
    <button onclick="copyAll()">Alles kopieren</button>
  </div>
</div>

    <div class="box">
      <h2>Kommentare</h2>
      <div id="comments"></div>
    </div>

    <div class="box">
      <h2>Transkript</h2>
      <div id="transcript"></div>
    </div>

  </div>

<script>
async function loadData() {
  const url = document.getElementById("url").value;

  const commentsDiv = document.getElementById("comments");
  const transcriptDiv = document.getElementById("transcript");

  // Ladeanzeige
  commentsDiv.innerHTML = "<p class='loading'>Lade Kommentare...</p>";
  transcriptDiv.innerHTML = "<p class='loading'>Lade Transkript...</p>";

  try {
    const res = await fetch("/api", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({url})
    });

    const data = await res.json();

    // Kommentare
    commentsDiv.innerHTML = data.comments.map(c => `
      <div class="comment">
        <div class="author">${c.author}</div>
        <div>${c.text}</div>
      </div>
    `).join("");

    // Transkript
    transcriptDiv.textContent = data.transcript;

  } catch (e) {
    commentsDiv.innerHTML = "Fehler beim Laden";
    transcriptDiv.innerHTML = "Fehler beim Laden";
  }
}

function copyAll() {
  const comments = Array.from(document.querySelectorAll(".comment")).map(c => {
    const author = c.querySelector(".author").innerText;
    const text = c.querySelector("div:last-child").innerText;
    return `${author}: ${text}`;
  });

  const transcript = document.getElementById("transcript").textContent;

  const finalText = 
`Neues Video neuer Kommentar.
Kommentare bisher:
${comments.join("\n")}

Transkript:
${transcript}`;

  navigator.clipboard.writeText(finalText)
    .then(() => alert("Kopiert!"))
    .catch(() => alert("Fehler beim Kopieren"));
}


</script>

</body>
</html>
